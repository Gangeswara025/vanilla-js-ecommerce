<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium E-commerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-links">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Product</a></li>
          <li><a href="#">Shop</a></li>
        </ul>
      </div>
      <div class="nav-logo">
        <img
          src="https://lume-demo1.myshopify.com/cdn/shop/files/logo_48e9d757-b2c3-4747-9038-b9100d8e8787.png?v=1747198873&width=352"
          alt="E-commerce Logo"
        />
      </div>
      <div class="nav-addons">
        <div class="addon">
          <i class="fa-solid fa-cart-arrow-down"></i>
          <a href="./cart.html">Cart <span id="cart-count" style="font-weight: 800; color: #fb641b;"></span></a>
        </div>
        <div class="addon">
          <i class="fa-regular fa-heart"></i>
          <a href="#">Wishlist</a>
        </div>
      </div>
    </nav>
    
    <main>
      <section class="hero-main">
        <div class="hero-image">
          <img
            src="https://lume-demo1.myshopify.com/cdn/shop/files/Slider-1.png?v=1749890418&width=1920"
            alt="Hero background image"
          />
        </div>
        
        <div class="hero-content">
          <p>Sale up to 40% off</p>
          <p>DISCOVER YOUR UNIQUE STYLE</p>
          <button>SHOP NOW</button>
        </div>
      </section>

      <section>
        <h1 class="section-title">FEATURED PRODUCTS</h1>

        <div class="shop-layout">
          <div class="main-container">
            <article class="products">
              <img src="https://lume-demo1.myshopify.com/cdn/shop/files/pro-52.jpg?v=1744180166&width=352" alt="Medium Shirt" />
              <h3 class="product-name">Medium Shirt</h3>
              <p class="product-price">$50</p>
              <button class="add-to-cart-btn">ADD TO CART</button>
            </article>

            <article class="products">
              <img src="https://lume-demo1.myshopify.com/cdn/shop/files/pro-23.jpg?v=1744180146&width=352" alt="Women T-Shirt" />
              <h3 class="product-name">Women T-Shirt</h3>
              <p class="product-price">$80</p>
              <button class="add-to-cart-btn">ADD TO CART</button>
            </article>

            <article class="products">
              <img src="https://lume-demo1.myshopify.com/cdn/shop/files/pro-19.jpg?v=1744180081&width=352" alt="Women Pants" />
              <h3 class="product-name">Women Pants</h3>
              <p class="product-price">$70</p>
              <button class="add-to-cart-btn">ADD TO CART</button>
            </article>

            <article class="products">
              <img src="https://lume-demo1.myshopify.com/cdn/shop/files/pro-2_e205607e-7e9d-4fed-9fd8-2b8b4caff4b4.jpg?v=1744180100&width=352" alt="Men Shirt" />
              <h3 class="product-name">Men Shirt</h3>
              <p class="product-price">$100</p>
              <button class="add-to-cart-btn">ADD TO CART</button>
            </article>

            <article class="products">
              <img src="https://lume-demo1.myshopify.com/cdn/shop/files/pro-60.jpg?v=1744180110&width=352" alt="Women Dress" />
              <h3 class="product-name">Women Dress</h3>
              <p class="product-price">$40</p>
              <button class="add-to-cart-btn">ADD TO CART</button>
            </article>

            <article class="products">
              <img src="https://lume-demo1.myshopify.com/cdn/shop/files/pro-38.jpg?v=1744180136&width=352" alt="Women Shirt" />
              <h3 class="product-name">Women Shirt</h3>
              <p class="product-price">$80</p>
              <button class="add-to-cart-btn">ADD TO CART</button>
            </article>
          </div>

        </div>
      </section>
    </main>
  </body>
</html>
